        /* 롱프레스 드래그 재정렬 */
        let dragState = { active: false, sec: null, ts: null, fromIdx: null, el: null, startY: 0 };
        function setupLongPressDrag(card, secId, tsId, idx) {
            let timer = null;
            function startHold(e) {
                if (['INPUT', 'SELECT', 'BUTTON', 'TEXTAREA'].includes(e.target.tagName)) return;
                timer = setTimeout(() => {
                    let touch = e.touches ? e.touches[0] : e;
                    dragState = { active: true, sec: secId, ts: tsId, fromIdx: idx, el: card, startY: touch.clientY };
                    card.classList.add('dragging');
                    document.body.style.overflow = 'hidden';
                }, 500);
            }
            function cancelHold() { if (timer) { clearTimeout(timer); timer = null; } }
            function onMove(e) {
                if (!dragState.active || dragState.el !== card) return;
                e.preventDefault();
                let touch = e.touches ? e.touches[0] : e;
                card.style.transform = `translateY(${touch.clientY - dragState.startY}px) scale(1.02)`;
                let list = card.parentElement;
                [...list.querySelectorAll('.sc')].forEach(c => c.classList.remove('drag-over-top', 'drag-over-bottom'));
                for (let c of list.querySelectorAll('.sc')) {
                    if (c === card) continue;
                    let rect = c.getBoundingClientRect();
                    let mid = rect.top + rect.height / 2;
                    if (touch.clientY < mid && touch.clientY > rect.top - 10) { c.classList.add('drag-over-top'); break; }
                    else if (touch.clientY >= mid && touch.clientY < rect.bottom + 10) { c.classList.add('drag-over-bottom'); break; }
                }
            }
            function onEnd(e) {
                cancelHold();
                if (!dragState.active || dragState.el !== card) return;
                let touch = e.changedTouches ? e.changedTouches[0] : e;
                card.classList.remove('dragging'); card.style.transform = ''; document.body.style.overflow = '';
                let list = card.parentElement;
                let cards = [...list.querySelectorAll('.sc')];
                cards.forEach(c => c.classList.remove('drag-over-top', 'drag-over-bottom'));
                let toIdx = dragState.fromIdx;
                for (let i = 0; i < cards.length; i++) {
                    if (cards[i] === card) continue;
                    let rect = cards[i].getBoundingClientRect();
                    if (touch.clientY < rect.top + rect.height / 2) { toIdx = i; break; }
                    toIdx = i + 1;
                }
                if (toIdx > dragState.fromIdx) toIdx--;
                if (toIdx !== dragState.fromIdx) {
                    let ts = getTS(dragState.sec, dragState.ts);
                    let [moved] = ts.active.splice(dragState.fromIdx, 1);
                    ts.active.splice(toIdx, 0, moved);
                    lb(); lc();
                }
                dragState.active = false;
            }
            card.addEventListener('touchstart', startHold, { passive: false });
            card.addEventListener('mousedown', startHold);
            card.addEventListener('touchmove', onMove, { passive: false });
            card.addEventListener('mousemove', onMove);
            card.addEventListener('touchend', onEnd);
            card.addEventListener('mouseup', onEnd);
            card.addEventListener('touchcancel', () => { cancelHold(); if (dragState.active && dragState.el === card) { card.classList.remove('dragging'); card.style.transform = ''; document.body.style.overflow = ''; dragState.active = false; } });
            card.addEventListener('mouseleave', cancelHold);
        }

            let savedToken = sessionStorage.getItem('driveToken');
            if (savedToken) {
                driveAccessToken = savedToken;
                document.getElementById("loginGate").style.setProperty('display', 'none', 'important');
                document.getElementById("appContent").style.setProperty('display', 'block', 'important');
                mp("ok", "구글 연결됨");
                driveLoad().then(() => startAutoSave()).catch(e => { console.log('Token expired:', e); driveLogout(); });
            }
        };
    </script>
